<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes Log</title>
<link rel="stylesheet" href="main.css">
</head>
<body>

<header>
  <h1>Notes Log</h1>
  <a class="back" href="index.html">← back to dashboard</a>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search notes…" oninput="renderNotes()" />
  <input type="text" id="filter-tag" placeholder="Filter by tag…" oninput="renderNotes()" />
  <button class="danger" onclick="clearAll()">Clear all</button>
  <span id="note-count"></span>
</div>

<div id="notes-container"></div>
<div class="export-row">
  <button onclick="exportNotes()">Export as .txt</button>
</div>

<script>
function getNotes() {
  return JSON.parse(localStorage.getItem('quick_notes') || '[]');
}

function saveNotes(notes) {
  localStorage.setItem('quick_notes', JSON.stringify(notes));
}

function renderNotes() {
  const container = document.getElementById('notes-container');
  const search = document.getElementById('search').value.toLowerCase();
  const tagFilter = document.getElementById('filter-tag').value.toLowerCase();
  let notes = getNotes();

  if (search) notes = notes.filter(n => n.text.toLowerCase().includes(search));
  if (tagFilter) notes = notes.filter(n => (n.tag || '').toLowerCase().includes(tagFilter));

  document.getElementById('note-count').textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

  if (notes.length === 0) {
    container.innerHTML = '<div id="empty-state">No notes yet. Write one on the dashboard.</div>';
    return;
  }

  container.innerHTML = '';
  notes.forEach((note, i) => {
    const card = document.createElement('div');
    card.className = 'note-card';

    const ts = new Date(note.ts);
    const dateStr = ts.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
    const timeStr = ts.toLocaleTimeString();

    card.innerHTML = `
      <div class="note-body">${escapeHtml(note.text)}</div>
      <div class="note-footer">
        <span>${dateStr} ${timeStr}</span>
        ${note.tag ? `<span class="note-tag">${escapeHtml(note.tag)}</span>` : ''}
        <button class="note-delete" onclick="deleteNote(${i})" title="Delete note">×</button>
      </div>`;
    container.appendChild(card);
  });
}

function deleteNote(displayIndex) {
  // re-derive the right note accounting for filtering
  const search = document.getElementById('search').value.toLowerCase();
  const tagFilter = document.getElementById('filter-tag').value.toLowerCase();
  let notes = getNotes();

  let filtered = notes.map((n, i) => ({ ...n, _idx: i }))
    .filter(n => {
      if (search && !n.text.toLowerCase().includes(search)) return false;
      if (tagFilter && !(n.tag || '').toLowerCase().includes(tagFilter)) return false;
      return true;
    });

  const realIdx = filtered[displayIndex]?._idx;
  if (realIdx == null) return;
  notes.splice(realIdx, 1);
  saveNotes(notes);
  renderNotes();
}

function clearAll() {
  if (confirm('Delete all notes?')) {
    localStorage.removeItem('quick_notes');
    renderNotes();
  }
}

function exportNotes() {
  const notes = getNotes();
  const lines = notes.map(n => {
    const ts = new Date(n.ts).toLocaleString();
    return `[${ts}]${n.tag ? ' #' + n.tag : ''}\n${n.text}\n`;
  }).join('\n---\n\n');
  const blob = new Blob([lines], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'notes.txt';
  a.click();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderNotes();

// refresh if another tab writes notes
window.addEventListener('storage', e => { if (e.key === 'quick_notes') renderNotes(); });
</script>
</body>
</html>

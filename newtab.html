<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f1eb;
    --border: #1a1a1a;
    --text: #1a1a1a;
    --muted: #666;
    --accent: #1a1a1a;
    --box-bg: #fff;
    --unread: #c0392b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .grid {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    grid-template-rows: auto 1fr;
    gap: 16px;
    max-width: 1100px;
  }

  .box {
    background: var(--box-bg);
    border: 1.5px solid var(--border);
    padding: 16px;
  }

  .box-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid #ddd;
    padding-bottom: 8px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ── Clock ── */
  #clock-box { grid-column: 1; grid-row: 1; }

  #time {
    font-size: 38px;
    font-weight: bold;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }

  #date-str {
    color: var(--muted);
    font-size: 12px;
  }

  /* ── RSS ── */
  #rss-box {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
  }

  #rss-config {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  #rss-url {
    flex: 1;
    border: 1px solid var(--border);
    padding: 5px 8px;
    font-family: inherit;
    font-size: 12px;
    background: var(--bg);
  }

  #rss-url:focus { outline: 2px solid var(--border); }

  button {
    border: 1.5px solid var(--border);
    background: var(--accent);
    color: #fff;
    padding: 5px 12px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  button:hover { opacity: 0.8; }
  button.secondary { background: var(--bg); color: var(--text); }

  #rss-list {
    flex: 1;
    overflow-y: auto;
    max-height: 460px;
  }

  .rss-item {
    border-bottom: 1px solid #eee;
    padding: 10px 0;
  }

  .rss-item:last-child { border-bottom: none; }

  .rss-item a {
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    line-height: 1.4;
    display: block;
    margin-bottom: 3px;
  }

  .rss-item a:hover { text-decoration: underline; }

  .rss-item.read a { color: var(--muted); }

  .rss-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .unread-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--unread);
    display: inline-block;
  }

  .rss-item.read .unread-dot { background: transparent; border: 1px solid #ccc; }

  #rss-status { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* ── Notes ── */
  #notes-box {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #note-input {
    width: 100%;
    border: 1px solid var(--border);
    padding: 8px;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg);
    resize: vertical;
    min-height: 120px;
  }

  #note-input:focus { outline: 2px solid var(--border); }

  .note-actions { display: flex; gap: 8px; }

  .note-tag {
    flex: 1;
    border: 1px solid var(--border);
    padding: 5px 8px;
    font-family: inherit;
    font-size: 12px;
    background: var(--bg);
  }

  #note-send { flex-shrink: 0; }

  #note-confirm {
    font-size: 11px;
    color: green;
    min-height: 14px;
  }

  /* ── Quick links / utilities ── */
  #util-box {
    grid-column: 3;
    grid-row: 1 / 3;
  }

  .util-section { margin-bottom: 16px; }
  .util-section-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .link-list { list-style: none; }
  .link-list li { margin-bottom: 4px; }
  .link-list a {
    color: var(--text);
    font-size: 13px;
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .link-list a:hover { border-bottom-color: var(--text); }

  .notes-link {
    display: inline-block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
  }
  .notes-link:hover { color: var(--text); }
</style>
</head>
<body>

<h1>Dashboard</h1>

<div class="grid">

  <!-- Clock -->
  <div class="box" id="clock-box">
    <div class="box-label">Date &amp; Time</div>
    <div id="time">--:--:--</div>
    <div id="date-str">Loading…</div>
  </div>

  <!-- RSS Feed -->
  <div class="box" id="rss-box">
    <div class="box-label">
      <span>RSS Feed</span>
      <span id="unread-count" style="color:var(--unread);font-size:11px;"></span>
    </div>
    <div id="rss-config">
      <input id="rss-url" type="url" placeholder="Paste RSS feed URL…" />
      <button onclick="loadFeed()">Fetch</button>
      <button class="secondary" onclick="markAllRead()">Mark all read</button>
    </div>
    <div id="rss-list"><span style="color:var(--muted);font-size:12px;">Enter a feed URL above to get started.</span></div>
    <div id="rss-status"></div>
  </div>

  <!-- Quick Notes -->
  <div class="box" id="notes-box">
    <div class="box-label">Quick Note</div>
    <textarea id="note-input" placeholder="Type a note…"></textarea>
    <div class="note-actions">
      <input class="note-tag" type="text" id="note-tag" placeholder="Tag (optional)" />
      <button id="note-send" onclick="sendNote()">Send →</button>
    </div>
    <div id="note-confirm"></div>
    <a class="notes-link" href="notes.html">View all notes →</a>
  </div>

  <!-- Utilities / Links -->
  <div class="box" id="util-box">
    <div class="box-label">Quick Links</div>
    <div class="util-section">
      <div class="util-section-label">Links</div>
      <ul class="link-list" id="link-list">
        <!-- Edit links here or manage them via the form below -->
        <li><a href="https://news.ycombinator.com" target="_blank">Hacker News</a></li>
        <li><a href="https://lobste.rs" target="_blank">Lobsters</a></li>
        <li><a href="https://wikipedia.org" target="_blank">Wikipedia</a></li>
      </ul>
    </div>

    <div class="util-section">
      <div class="util-section-label">Add Link</div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <input id="new-link-label" class="note-tag" type="text" placeholder="Label" style="width:100%">
        <input id="new-link-url" class="note-tag" type="url" placeholder="https://…" style="width:100%">
        <button onclick="addLink()">Add</button>
      </div>
    </div>

    <div class="util-section">
      <div class="util-section-label">Notes log</div>
      <a href="notes.html" style="font-size:12px;color:var(--text);">→ notes.html</a>
    </div>
  </div>

</div>

<script>
/* ───── Clock ───── */
function updateClock() {
  const now = new Date();
  document.getElementById('time').textContent = now.toLocaleTimeString();
  document.getElementById('date-str').textContent = now.toLocaleDateString(undefined, {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}
updateClock();
setInterval(updateClock, 1000);

/* ───── RSS ───── */
const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
let readItems = JSON.parse(localStorage.getItem('rss_read') || '[]');
let savedFeedUrl = localStorage.getItem('rss_feed_url') || '';

if (savedFeedUrl) {
  document.getElementById('rss-url').value = savedFeedUrl;
  loadFeed();
}

async function loadFeed() {
  const url = document.getElementById('rss-url').value.trim();
  if (!url) return;
  document.getElementById('rss-status').textContent = 'Fetching…';
  localStorage.setItem('rss_feed_url', url);
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'Feed error');
    renderFeed(data.items);
    document.getElementById('rss-status').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('rss-status').textContent = 'Error: ' + e.message;
  }
}

function renderFeed(items) {
  const list = document.getElementById('rss-list');
  list.innerHTML = '';
  let unread = 0;
  items.forEach(item => {
    const isRead = readItems.includes(item.guid || item.link);
    if (!isRead) unread++;
    const div = document.createElement('div');
    div.className = 'rss-item' + (isRead ? ' read' : '');
    div.innerHTML = `
      <a href="${item.link}" target="_blank" onclick="markRead('${(item.guid || item.link).replace(/'/g,"\\'")}', this.closest('.rss-item'))">
        ${item.title}
      </a>
      <div class="rss-meta">
        <span class="unread-dot"></span>
        <span>${item.author || ''}</span>
        <span>${item.pubDate ? new Date(item.pubDate).toLocaleDateString() : ''}</span>
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('unread-count').textContent = unread > 0 ? `${unread} unread` : '';
}

function markRead(id, el) {
  if (!readItems.includes(id)) {
    readItems.push(id);
    localStorage.setItem('rss_read', JSON.stringify(readItems));
  }
  if (el) el.classList.add('read');
  updateUnreadCount();
}

function markAllRead() {
  document.querySelectorAll('.rss-item').forEach(el => {
    const link = el.querySelector('a');
    if (link) markRead(link.getAttribute('onclick')?.match(/'([^']+)'/)?.[1] || '', el);
    el.classList.add('read');
  });
  document.getElementById('unread-count').textContent = '';
}

function updateUnreadCount() {
  const total = document.querySelectorAll('.rss-item:not(.read)').length;
  document.getElementById('unread-count').textContent = total > 0 ? `${total} unread` : '';
}

/* ───── Notes ───── */
function sendNote() {
  const text = document.getElementById('note-input').value.trim();
  const tag = document.getElementById('note-tag').value.trim();
  if (!text) return;

  const notes = JSON.parse(localStorage.getItem('quick_notes') || '[]');
  notes.unshift({ text, tag, ts: new Date().toISOString() });
  localStorage.setItem('quick_notes', JSON.stringify(notes));

  document.getElementById('note-input').value = '';
  document.getElementById('note-tag').value = '';
  const confirm = document.getElementById('note-confirm');
  confirm.textContent = '✓ Saved to notes.html';
  setTimeout(() => confirm.textContent = '', 2500);
}

// Ctrl+Enter to send note
document.getElementById('note-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) sendNote();
});

/* ───── Quick Links ───── */
let customLinks = JSON.parse(localStorage.getItem('custom_links') || '[]');
renderLinks();

function addLink() {
  const label = document.getElementById('new-link-label').value.trim();
  const url = document.getElementById('new-link-url').value.trim();
  if (!label || !url) return;
  customLinks.push({ label, url });
  localStorage.setItem('custom_links', JSON.stringify(customLinks));
  document.getElementById('new-link-label').value = '';
  document.getElementById('new-link-url').value = '';
  renderLinks();
}

function renderLinks() {
  const ul = document.getElementById('link-list');
  // keep the hardcoded ones (first 3 children), then append custom
  while (ul.children.length > 3) ul.removeChild(ul.lastChild);
  customLinks.forEach(({ label, url }) => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="${url}" target="_blank">${label}</a>`;
    ul.appendChild(li);
  });
}
</script>
</body>
